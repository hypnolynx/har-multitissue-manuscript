<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Table viewer</title>
<style>
:root { --fg:#1a1a1a; --muted:#666; --accent:#0b5394; --bg:#fff; --code:#f5f5f5; --border:#e2e2e2; }
* { box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--fg); background:var(--bg); line-height:1.65; margin:0; }
.wrap { max-width:820px; margin:0 auto; padding:2rem 1.25rem 5rem; }
nav.top { background:#0b5394; color:#fff; padding:.7rem 1.25rem; position:sticky; top:0; z-index:10;
  box-shadow:0 1px 4px rgba(0,0,0,.15); }
nav.top a { color:#fff; text-decoration:none; margin-right:1.2rem; font-weight:600; font-size:.95rem; opacity:.9; }
nav.top a:hover { opacity:1; text-decoration:underline; }
h1 { font-size:1.85rem; line-height:1.25; margin-top:1.5rem; }
h2 { font-size:1.4rem; margin-top:2.4rem; border-bottom:2px solid var(--border); padding-bottom:.3rem; }
h3 { font-size:1.12rem; margin-top:1.8rem; color:var(--fg); }
p, li { font-size:1rem; }
a { color:var(--accent); }
img { max-width:100%; height:auto; display:block; margin:1.5rem auto; border:1px solid var(--border);
  border-radius:6px; box-shadow:0 1px 6px rgba(0,0,0,.08); }
code { background:var(--code); padding:.1rem .35rem; border-radius:4px; font-size:.88em;
  font-family:"SFMono-Regular",Consolas,monospace; }
pre code { display:block; padding:1rem; overflow-x:auto; }
table { border-collapse:collapse; width:100%; margin:1.5rem 0; font-size:.9rem; }
th, td { border:1px solid var(--border); padding:.45rem .6rem; text-align:left; }
th { background:#f0f4f8; }
tr:nth-child(even) td { background:#fafbfc; }
hr { border:none; border-top:1px solid var(--border); margin:2.5rem 0; }
blockquote { border-left:3px solid var(--accent); margin:1.2rem 0; padding:.2rem 1rem; color:var(--muted); background:#fafbfc; }
em { font-style:italic; }
footer { color:var(--muted); font-size:.85rem; border-top:1px solid var(--border); margin-top:3rem; padding-top:1rem; }

[data-theme="dark"] {
  --fg:#e6e6e6; --muted:#9aa4af; --accent:#5aa9e6; --bg:#15181c; --code:#232830; --border:#2c333c;
}
[data-theme="dark"] th { background:#20262e; }
[data-theme="dark"] tr:nth-child(even) td { background:#191d22; }
[data-theme="dark"] blockquote { background:#191d22; }
[data-theme="dark"] img { border-color:#2c333c; box-shadow:0 1px 6px rgba(0,0,0,.4); }
html { color-scheme:light dark; }
body { transition:background .2s ease, color .2s ease; }
.theme-toggle { background:transparent; border:1px solid rgba(255,255,255,.5); color:#fff;
  border-radius:6px; padding:.25rem .6rem; cursor:pointer; font-size:.9rem; font-weight:600; }
.theme-toggle:hover { background:rgba(255,255,255,.15); }
.nav-right { float:right; display:flex; align-items:center; gap:1rem; }

.gh-link { color:#fff; display:inline-flex; align-items:center; opacity:.9; }
.gh-link:hover { opacity:1; }
.gh-link svg { display:block; }

figure.fig { margin:1.5rem 0; }
.fig-frame { position:relative; overflow:hidden; border:1px solid var(--border); border-radius:6px;
  background:var(--code); cursor:zoom-in; box-shadow:0 1px 6px rgba(0,0,0,.08); }
.fig-frame img { margin:0; border:none; border-radius:0; box-shadow:none; width:100%; display:block;
  transform-origin:0 0; transition:transform .05s linear; will-change:transform; }
.fig-frame.zoomed { cursor:grab; }
.fig-frame.dragging { cursor:grabbing; }
.fig-hint { font-size:.78rem; color:var(--muted); margin:.3rem 0 0; text-align:right; }
.lightbox { position:fixed; inset:0; background:rgba(0,0,0,.9); display:none; z-index:1000;
  align-items:center; justify-content:center; }
.lightbox.open { display:flex; }
.lightbox img { max-width:96vw; max-height:92vh; margin:0; border:none; border-radius:4px;
  transform-origin:center center; cursor:grab; box-shadow:0 4px 30px rgba(0,0,0,.6); }
.lightbox-close { position:fixed; top:14px; right:20px; color:#fff; font-size:2rem; cursor:pointer;
  background:none; border:none; line-height:1; z-index:1001; }
.lightbox-cap { position:fixed; bottom:14px; left:0; right:0; text-align:center; color:#ddd; font-size:.85rem; padding:0 1rem; }

.muted { color:var(--muted); }
</style>
</head>
<body>
<nav class="top">
  <a href="index.html">Manuscript</a>
  <a href="supplementary.html">Supplementary</a>
  <a href="data/">Data files</a>
  <span class="nav-right">
    <a class="gh-link" href="https://github.com/hypnolynx/har-multitissue-manuscript" target="_blank" rel="noopener" title="View source on GitHub" aria-label="GitHub repository"><svg height="22" width="22" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"></path></svg></a>
    <button id="theme-btn" class="theme-toggle" type="button" aria-label="Toggle dark mode">&#9790; Dark</button>
  </span>
</nav>
<div class="wrap">
  <p><a href="data/">&larr; All data files</a></p>
  <h1 id="fname">Loading…</h1>
  <p id="meta" class="muted"></p>
  <p><a id="dl" href="#" download>Download raw CSV</a></p>
  <div id="tablewrap" style="overflow-x:auto;"></div>
</div>

<script>
(function(){
  var KEY='har-theme';
  var saved=localStorage.getItem(KEY);
  if(saved){document.documentElement.setAttribute('data-theme',saved);}
  else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches){
    document.documentElement.setAttribute('data-theme','dark');}
  function label(){var d=document.documentElement.getAttribute('data-theme')==='dark';
    var b=document.getElementById('theme-btn'); if(b)b.textContent=d?'\u2600 Light':'\u263e Dark';}
  window.addEventListener('DOMContentLoaded',function(){
    label();
    var b=document.getElementById('theme-btn');
    if(b)b.addEventListener('click',function(){
      var d=document.documentElement.getAttribute('data-theme')==='dark';
      var t=d?'light':'dark';
      document.documentElement.setAttribute('data-theme',t);
      localStorage.setItem(KEY,t); label();});
  });
})();
</script>

<script>
(function(){
  var params=new URLSearchParams(location.search);
  var file=params.get('file');
  var fn=document.getElementById('fname'), meta=document.getElementById('meta'),
      wrap=document.getElementById('tablewrap'), dl=document.getElementById('dl');
  if(!file){fn.textContent='No file specified';return;}
  if(!/^data\/[A-Za-z0-9_.\-]+\.csv$/.test(file)){fn.textContent='Invalid file';return;}
  fn.textContent=file.split('/').pop(); dl.href=file;
  fetch(file).then(function(r){if(!r.ok)throw new Error(r.status);return r.text();})
    .then(function(txt){render(txt);})
    .catch(function(e){wrap.innerHTML='<p style="color:#c0392b">Could not load '+file+' ('+e.message+')</p>';});
  function parseCSV(text){
    var rows=[],row=[],f='',i=0,q=false,c; text=text.replace(/\r\n?/g,'\n');
    while(i<text.length){c=text[i];
      if(q){ if(c==='"'){ if(text[i+1]==='"'){f+='"';i++;} else q=false;} else f+=c; }
      else { if(c==='"')q=true; else if(c===','){row.push(f);f='';}
        else if(c==='\n'){row.push(f);rows.push(row);row=[];f='';} else f+=c; }
      i++;}
    if(f.length||row.length){row.push(f);rows.push(row);}
    return rows.filter(function(r){return r.length>1||(r.length===1&&r[0]!=='');});
  }
  function render(txt){
    var rows=parseCSV(txt); if(!rows.length){wrap.textContent='(empty)';return;}
    var head=rows[0], body=rows.slice(1);
    meta.textContent=body.length+' rows \u00d7 '+head.length+' columns';
    var sortState={col:-1,dir:1};
    var tbl=document.createElement('table');
    var thead=document.createElement('thead'), tr=document.createElement('tr');
    head.forEach(function(h,ci){var th=document.createElement('th');th.textContent=h;
      th.style.cursor='pointer';th.title='Click to sort';
      th.addEventListener('click',function(){
        sortState.dir=(sortState.col===ci)?-sortState.dir:1; sortState.col=ci;
        body.sort(function(a,b){var x=a[ci]||'',y=b[ci]||'';
          var nx=parseFloat(x),ny=parseFloat(y);
          if(!isNaN(nx)&&!isNaN(ny))return (nx-ny)*sortState.dir;
          return x.localeCompare(y)*sortState.dir;});
        fill();});
      tr.appendChild(th);});
    thead.appendChild(tr);tbl.appendChild(thead);
    var tbody=document.createElement('tbody');tbl.appendChild(tbody);
    function fill(){tbody.innerHTML='';
      body.forEach(function(r){var t=document.createElement('tr');
        head.forEach(function(_,ci){var td=document.createElement('td');td.textContent=r[ci]!==undefined?r[ci]:'';t.appendChild(td);});
        tbody.appendChild(t);});}
    fill();wrap.innerHTML='';wrap.appendChild(tbl);
  }
})();
</script>
</body>
</html>
